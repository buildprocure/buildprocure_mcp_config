<VirtualHost *:80>
    ServerName mcp.buildprocure.com

    RewriteEngine On
    RewriteCond %{HTTPS} !=on
    RewriteRule ^/(.*)$ https://%{HTTP_HOST}/$1 [R=301,L]
</VirtualHost>

<VirtualHost *:443>
    ServerName mcp.buildprocure.com

    SSLEngine on
    SSLCertificateFile /etc/letsencrypt/live/mcp.buildprocure.com/fullchain.pem
    SSLCertificateKeyFile /etc/letsencrypt/live/mcp.buildprocure.com/privkey.pem

    ProxyPreserveHost On
    ProxyRequests Off
    AllowEncodedSlashes NoDecode

    RequestHeader set X-Forwarded-Proto "https"
    RequestHeader set X-Forwarded-Port "443"

    ProxyPass        /mcp    http://127.0.0.1:8000/mcp
    ProxyPassReverse /mcp    http://127.0.0.1:8000/mcp

    ProxyPass        /health http://127.0.0.1:8000/health
    ProxyPassReverse /health http://127.0.0.1:8000/health

    ErrorLog ${APACHE_LOG_DIR}/buildprocure-mcp-error.log
    CustomLog ${APACHE_LOG_DIR}/buildprocure-mcp-access.log combined
</VirtualHost>