version: "3.9"

services:
  buildprocure-mcp:
    image: ghcr.io/buildprocure/buildprocure_mcp_config:latest
    container_name: buildprocure-mcp
    env_file:
      - .env
    ports:
      - "3011:80"
    restart: always
    networks:
      - app-network

networks:
  app-network:
    external: true
    name: html_app-network

