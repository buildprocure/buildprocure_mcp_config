<VirtualHost *:80>
    ServerName mcp.buildprocure.com
    ServerAlias 143.198.64.132

    ProxyRequests Off
    ProxyPreserveHost On

    RequestHeader set X-Forwarded-Proto "http"
    RequestHeader set X-Forwarded-Port "80"

    ProxyTimeout 300

    # Optional shared token gate at Apache layer
    # Uncomment and replace if you want Apache to block requests
    # before they hit Python.
    #
    # RewriteEngine On
    # RewriteCond %{HTTP:Authorization} !^Bearer\ YOUR_SHARED_TOKEN$
    # RewriteRule ^ - [F]

    ProxyPass        /health  http://127.0.0.1:8000/health
    ProxyPassReverse /health  http://127.0.0.1:8000/health

    ProxyPass        /mcp     http://127.0.0.1:8000/mcp
    ProxyPassReverse /mcp     http://127.0.0.1:8000/mcp

    ErrorLog /dev/stderr
    CustomLog /dev/stdout common
</VirtualHost>